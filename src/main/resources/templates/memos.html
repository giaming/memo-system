<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备忘录系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .memo-container {
            max-width: 1200px;
            margin: 20px auto;
        }
        .memo-item {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .memo-item.completed {
            background-color: #e9ecef;
            text-decoration: line-through;
            opacity: 0.7;
        }
        .memo-item.high {
            border-left: 4px solid #dc3545;
        }
        .memo-item.medium {
            border-left: 4px solid #ffc107;
        }
        .memo-item.low {
            border-left: 4px solid #28a745;
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .memo-title {
            font-weight: bold;
            font-size: 18px;
        }
        .memo-content {
            margin-bottom: 10px;
        }
        .memo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6c757d;
        }
        .memo-actions {
            display: flex;
            gap: 10px;
        }
        .filter-buttons {
            margin-bottom: 20px;
        }
        .navbar {
            margin-bottom: 20px;
        }
        /* 每日汇总卡片样式 */
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .summary-card h5 {
            margin-bottom: 15px;
            font-weight: bold;
        }
        .summary-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            min-width: 80px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        .stat-item.overdue .stat-value {
            color: #ff6b6b;
        }
        .stat-item.high-priority .stat-value {
            color: #ffd93d;
        }
        /* 优先级标签 */
        .priority-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .priority-high {
            background-color: #dc3545;
            color: white;
        }
        .priority-medium {
            background-color: #ffc107;
            color: #212529;
        }
        .priority-low {
            background-color: #28a745;
            color: white;
        }
        /* 截止日期样式 */
        .due-date {
            font-size: 12px;
            color: #6c757d;
        }
        .due-date.overdue {
            color: #dc3545;
            font-weight: bold;
        }
        /* 分页样式 */
        .pagination-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        /* 搜索框样式 */
        .search-box {
            margin-bottom: 15px;
        }
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">备忘录系统</span>
            <div>
                <span class="navbar-text me-3" id="welcomeText"></span>
                <a href="#" class="nav-link d-inline" id="myMemos">我的备忘录</a>
                <a href="#" class="nav-link d-inline" id="logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="memo-container">
        <!-- 每日汇总卡片 -->
        <div class="summary-card" id="summaryCard">
            <h5>📊 今日待办汇总</h5>
            <div class="summary-stats">
                <div class="stat-item">
                    <div class="stat-value" id="statTodayTotal">0</div>
                    <div class="stat-label">今日待办</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statUncompleted">0</div>
                    <div class="stat-label">未完成</div>
                </div>
                <div class="stat-item high-priority">
                    <div class="stat-value" id="statHighPriority">0</div>
                    <div class="stat-label">高优先级</div>
                </div>
                <div class="stat-item overdue">
                    <div class="stat-value" id="statOverdue">0</div>
                    <div class="stat-label">已逾期</div>
                </div>
            </div>
        </div>

        <!-- 搜索框和筛选按钮 -->
        <div class="search-box">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchTitle" placeholder="搜索标题...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="searchPriority">
                        <option value="">全部优先级</option>
                        <option value="HIGH">高优先级</option>
                        <option value="MEDIUM">中优先级</option>
                        <option value="LOW">低优先级</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="searchCompleted">
                        <option value="">全部状态</option>
                        <option value="false">未完成</option>
                        <option value="true">已完成</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" id="searchBtn">搜索</button>
                </div>
            </div>
        </div>

        <div class="filter-buttons">
            <button class="btn btn-primary" id="createMemoBtn">创建备忘录</button>
            <div class="btn-group">
                <button class="btn btn-outline-secondary active" data-status="all">全部</button>
                <button class="btn btn-outline-secondary" data-status="completed">已完成</button>
                <button class="btn btn-outline-secondary" data-status="uncompleted">未完成</button>
            </div>
            <button class="btn btn-outline-info" id="refreshBtn">刷新汇总</button>
        </div>

        <div id="memoList">
            <!-- 备忘录列表将通过JavaScript动态生成 -->
        </div>

        <!-- 分页控件 -->
        <div class="pagination-container" id="paginationContainer">
            <nav>
                <ul class="pagination" id="pagination">
                    <!-- 分页按钮将通过JavaScript动态生成 -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- 创建/编辑备忘录模态框 -->
    <div class="modal fade" id="memoModal" tabindex="-1" aria-labelledby="memoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="memoModalLabel">创建备忘录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="memoForm">
                        <input type="hidden" id="memoId">
                        <div class="mb-3">
                            <label for="memoTitle" class="form-label">标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="memoTitle" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label for="memoContent" class="form-label">内容</label>
                            <textarea class="form-control" id="memoContent" rows="3" maxlength="500"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="memoPriority" class="form-label">优先级</label>
                            <select class="form-select" id="memoPriority">
                                <option value="HIGH">🔴 高优先级</option>
                                <option value="MEDIUM" selected>🟡 中优先级</option>
                                <option value="LOW">🟢 低优先级</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="memoDueDate" class="form-label">截止日期</label>
                            <input type="date" class="form-control" id="memoDueDate">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveMemoBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 获取token和用户信息
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        const username = localStorage.getItem('username');

        if (!token) {
            window.location.href = '/login';
        }

        // 显示欢迎信息
        document.getElementById('welcomeText').textContent = `欢迎，${username || '用户'}`;

        // 模态框实例
        const memoModal = new bootstrap.Modal(document.getElementById('memoModal'));

        // 全局变量
        let currentMemos = [];
        let currentFilter = 'all';
        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;
        let currentSearchParams = {};

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            loadDailySummary();
            loadMemos();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            // 创建备忘录按钮
            document.getElementById('createMemoBtn').addEventListener('click', () => {
                openMemoModal();
            });

            // 保存备忘录按钮
            document.getElementById('saveMemoBtn').addEventListener('click', () => {
                saveMemo();
            });

            // 筛选按钮
            document.querySelectorAll('.btn-group .btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.status;
                    loadMemos();
                });
            });

            // 搜索按钮
            document.getElementById('searchBtn').addEventListener('click', () => {
                currentPage = 1;
                loadMemos();
            });

            // 刷新汇总按钮
            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadDailySummary();
            });

            // 退出登录
            document.getElementById('logout').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                localStorage.removeItem('username');
                window.location.href = '/login';
            });
        }

        // 加载每日汇总
        async function loadDailySummary() {
            try {
                const response = await fetch('/api/memo/daily-summary', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('加载汇总失败');
                }

                const data = await response.json();
                if (data.code === 200) {
                    updateSummaryCard(data.data);
                }
            } catch (error) {
                console.error('加载每日汇总失败:', error);
            }
        }

        // 更新汇总卡片
        function updateSummaryCard(summary) {
            document.getElementById('statTodayTotal').textContent = summary.todayTotal || 0;
            document.getElementById('statCompleted').textContent = summary.completed || 0;
            document.getElementById('statUncompleted').textContent = summary.uncompleted || 0;
            document.getElementById('statHighPriority').textContent = summary.highPriority || 0;
            document.getElementById('statOverdue').textContent = summary.overdue || 0;
        }

        // 加载备忘录（使用分页接口）
        async function loadMemos() {
            showLoading(true);

            // 构建搜索参数
            const searchParams = new URLSearchParams();
            searchParams.append('pageNum', currentPage);
            searchParams.append('pageSize', pageSize);

            // 添加筛选条件
            const title = document.getElementById('searchTitle').value;
            if (title) {
                searchParams.append('title', title);
            }

            const priority = document.getElementById('searchPriority').value;
            if (priority) {
                searchParams.append('priority', priority);
            }

            // 根据筛选按钮添加完成状态
            if (currentFilter === 'completed') {
                searchParams.append('completed', 'true');
            } else if (currentFilter === 'uncompleted') {
                searchParams.append('completed', 'false');
            }

            try {
                const response = await fetch(`/api/memo/page?${searchParams.toString()}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const data = await response.json();
                if (data.code === 200) {
                    currentMemos = data.data.records || [];
                    totalPages = data.data.pages || 1;
                    renderMemos();
                    renderPagination();
                }
            } catch (error) {
                console.error('加载备忘录失败:', error);
                alert('加载备忘录失败');
            } finally {
                showLoading(false);
            }
        }

        // 显示加载状态
        function showLoading(show) {
            const memoList = document.getElementById('memoList');
            if (show) {
                memoList.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';
            }
        }

        // 渲染备忘录列表
        function renderMemos() {
            const memoList = document.getElementById('memoList');

            if (currentMemos.length === 0) {
                memoList.innerHTML = '<div class="alert alert-info">暂无备忘录</div>';
                return;
            }

            memoList.innerHTML = currentMemos.map(memo => {
                // 确定优先级样式类
                let priorityClass = '';
                let priorityBadge = '';
                switch (memo.priority) {
                    case 1:
                        priorityClass = 'high';
                        priorityBadge = '<span class="priority-badge priority-high">高优先级</span>';
                        break;
                    case 2:
                        priorityClass = 'medium';
                        priorityBadge = '<span class="priority-badge priority-medium">中优先级</span>';
                        break;
                    case 3:
                        priorityClass = 'low';
                        priorityBadge = '<span class="priority-badge priority-low">低优先级</span>';
                        break;
                }

                // 截止日期显示
                let dueDateHtml = '';
                if (memo.dueDate) {
                    const dueDate = new Date(memo.dueDate);
                    const now = new Date();
                    const isOverdue = dueDate < now && !memo.isCompleted;
                    const dateStr = dueDate.toLocaleDateString('zh-CN');
                    const dateClass = isOverdue ? 'due-date overdue' : 'due-date';
                    const overdueLabel = isOverdue ? ' ⚠️已逾期' : '';
                    dueDateHtml = `<span class="${dateClass}">📅 ${dateStr}${overdueLabel}</span>`;
                }

                return `
                    <div class="memo-item ${memo.isCompleted ? 'completed' : ''} ${priorityClass}">
                        <div class="memo-header">
                            <div>
                                <span class="memo-title">${escapeHtml(memo.title)}</span>
                                ${priorityBadge}
                            </div>
                            <input type="checkbox" class="complete-checkbox" ${memo.isCompleted ? 'checked' : ''} data-id="${memo.id}">
                        </div>
                        <div class="memo-content">${escapeHtml(memo.content || '')}</div>
                        <div class="memo-footer">
                            <div>
                                ${dueDateHtml}
                                <span style="margin-left: 10px;">创建: ${formatDate(memo.createTime)}</span>
                            </div>
                            <div class="memo-actions">
                                <button class="btn btn-sm btn-primary edit-btn" data-id="${memo.id}">编辑</button>
                                <button class="btn btn-sm btn-danger delete-btn" data-id="${memo.id}">删除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 添加事件监听器
            addMemoItemListeners();
        }

        // 添加备忘录项的事件监听器
        function addMemoItemListeners() {
            // 完成复选框 - 使用新版接口
            document.querySelectorAll('.complete-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    const completed = e.target.checked;
                    updateMemoStatus(id, completed);
                });
            });

            // 编辑按钮
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    editMemo(e.target.dataset.id);
                });
            });

            // 删除按钮
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    deleteMemo(e.target.dataset.id);
                });
            });
        }

        // 渲染分页控件
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';

            // 上一页
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${currentPage - 1}">上一页</a>
            </li>`;

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a>
                    </li>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            // 下一页
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${currentPage + 1}">下一页</a>
            </li>`;

            pagination.innerHTML = html;

            // 添加分页点击事件
            pagination.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = parseInt(e.target.dataset.page);
                    if (page >= 1 && page <= totalPages) {
                        currentPage = page;
                        loadMemos();
                    }
                });
            });
        }

        // 打开备忘录模态框
        function openMemoModal(memo = null) {
            const form = document.getElementById('memoForm');
            const title = document.getElementById('memoModalLabel');
            const saveBtn = document.getElementById('saveMemoBtn');

            if (memo) {
                title.textContent = '编辑备忘录';
                saveBtn.textContent = '更新';
                document.getElementById('memoId').value = memo.id;
                document.getElementById('memoTitle').value = memo.title;
                document.getElementById('memoContent').value = memo.content || '';

                // 设置优先级（数值转换为枚举名称）
                let priorityValue = 'MEDIUM';
                if (memo.priority === 1) priorityValue = 'HIGH';
                else if (memo.priority === 3) priorityValue = 'LOW';
                document.getElementById('memoPriority').value = priorityValue;

                // 设置截止日期
                if (memo.dueDate) {
                    const dueDate = new Date(memo.dueDate);
                    document.getElementById('memoDueDate').value = dueDate.toISOString().split('T')[0];
                } else {
                    document.getElementById('memoDueDate').value = '';
                }
            } else {
                title.textContent = '创建备忘录';
                saveBtn.textContent = '保存';
                form.reset();
                document.getElementById('memoId').value = '';
                document.getElementById('memoPriority').value = 'MEDIUM';
            }

            memoModal.show();
        }

        // 保存备忘录
        async function saveMemo() {
            const id = document.getElementById('memoId').value;
            const title = document.getElementById('memoTitle').value.trim();
            const content = document.getElementById('memoContent').value.trim();
            const priority = document.getElementById('memoPriority').value;
            const dueDate = document.getElementById('memoDueDate').value;

            if (!title) {
                alert('标题不能为空');
                return;
            }

            const memoData = {
                title,
                content,
                priority,
                dueDate: dueDate || null
            };

            try {
                let response;
                if (id) {
                    // 更新备忘录
                    response = await fetch(`/api/memo/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(memoData)
                    });
                } else {
                    // 创建备忘录
                    response = await fetch('/api/memo', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(memoData)
                    });
                }

                const data = await response.json();
                if (data.code === 200) {
                    memoModal.hide();
                    loadMemos();
                    loadDailySummary();
                    alert(id ? '更新成功' : '创建成功');
                } else {
                    alert(data.msg || '操作失败');
                }
            } catch (error) {
                console.error('保存备忘录失败:', error);
                alert('保存失败，请稍后重试');
            }
        }

        // 更新备忘录状态（使用新版 PATCH 接口）
        async function updateMemoStatus(id, completed) {
            try {
                const response = await fetch(`/api/memo/${id}/status?completed=${completed}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                if (data.code === 200) {
                    loadMemos();
                    loadDailySummary();
                } else {
                    alert(data.msg || '操作失败');
                    // 恢复复选框状态
                    loadMemos();
                }
            } catch (error) {
                console.error('更新状态失败:', error);
                alert('操作失败，请稍后重试');
                loadMemos();
            }
        }

        // 编辑备忘录
        function editMemo(id) {
            const memo = currentMemos.find(m => m.id === parseInt(id));
            if (memo) {
                openMemoModal(memo);
            }
        }

        // 删除备忘录
        async function deleteMemo(id) {
            if (confirm('确定要删除这个备忘录吗？')) {
                try {
                    const response = await fetch(`/api/memo/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    const data = await response.json();
                    if (data.code === 200) {
                        loadMemos();
                        loadDailySummary();
                        alert('删除成功');
                    } else {
                        alert(data.msg || '删除失败');
                    }
                } catch (error) {
                    console.error('删除备忘录失败:', error);
                    alert('删除失败，请稍后重试');
                }
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
