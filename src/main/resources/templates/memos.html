<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备忘录系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .memo-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/memos">
                <span class="brand-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                    </svg>
                </span>
                备忘录系统
            </a>
            <div class="navbar-nav ms-auto align-items-center">
                <span class="user-info">
                    <span class="avatar" id="avatarText">用</span>
                    <span id="welcomeText">欢迎</span>
                </span>
                <a class="nav-link" href="#" id="logoutBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    退出
                </a>
            </div>
        </div>
    </nav>

    <div class="memo-container">
        <!-- 每日汇总 -->
        <div class="summary-card" id="summaryCard">
            <h5>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                今日待办汇总
            </h5>
            <div class="summary-stats">
                <div class="stat-item">
                    <div class="stat-value" id="statTodayTotal">0</div>
                    <div class="stat-label">今日待办</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statUncompleted">0</div>
                    <div class="stat-label">未完成</div>
                </div>
                <div class="stat-item high-priority">
                    <div class="stat-value" id="statHighPriority">0</div>
                    <div class="stat-label">高优先级</div>
                </div>
                <div class="stat-item overdue">
                    <div class="stat-value" id="statOverdue">0</div>
                    <div class="stat-label">已逾期</div>
                </div>
            </div>
        </div>

        <!-- 搜索与操作栏 -->
        <div class="action-bar">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchTitle" placeholder="搜索标题...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="searchPriority">
                        <option value="">全部优先级</option>
                        <option value="HIGH">高优先级</option>
                        <option value="MEDIUM">中优先级</option>
                        <option value="LOW">低优先级</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="searchCompleted">
                        <option value="">全部状态</option>
                        <option value="false">未完成</option>
                        <option value="true">已完成</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" id="searchBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        搜索
                    </button>
                </div>
            </div>
            <div class="filter-buttons mt-3">
                <button class="btn btn-primary" id="createMemoBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    创建备忘录
                </button>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary active" data-status="all">全部</button>
                    <button class="btn btn-outline-secondary" data-status="completed">已完成</button>
                    <button class="btn btn-outline-secondary" data-status="uncompleted">未完成</button>
                </div>
                <button class="btn btn-outline-primary" id="refreshBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    刷新汇总
                </button>
            </div>
        </div>

        <!-- 备忘录列表 -->
        <div class="memo-list" id="memoList"></div>

        <!-- 分页 -->
        <div class="pagination-container" id="paginationContainer">
            <nav><ul class="pagination" id="pagination"></ul></nav>
        </div>
    </div>

    <!-- 创建/编辑模态框 -->
    <div class="modal fade" id="memoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="memoModalLabel">创建备忘录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="memoForm">
                        <input type="hidden" id="memoId">
                        <div class="mb-3">
                            <label for="memoTitle" class="form-label">标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="memoTitle" required maxlength="100" placeholder="请输入备忘录标题">
                        </div>
                        <div class="mb-3">
                            <label for="memoContent" class="form-label">内容</label>
                            <textarea class="form-control" id="memoContent" rows="3" maxlength="500" placeholder="请输入备忘录内容（选填）"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="memoPriority" class="form-label">优先级</label>
                            <select class="form-select" id="memoPriority">
                                <option value="HIGH">高优先级</option>
                                <option value="MEDIUM" selected>中优先级</option>
                                <option value="LOW">低优先级</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="memoDueDate" class="form-label">截止日期</label>
                            <input type="date" class="form-control" id="memoDueDate">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveMemoBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // ==================== 初始化 ====================
        if (!checkAuth()) throw new Error('未登录');

        const username = getUsername();
        document.getElementById('welcomeText').textContent = '欢迎，' + username;
        document.getElementById('avatarText').textContent = username.charAt(0);

        const memoModal = new bootstrap.Modal(document.getElementById('memoModal'));
        let currentMemos = [];
        let currentFilter = 'all';
        let currentPage = 1;
        const pageSize = 10;
        let totalPages = 1;

        document.addEventListener('DOMContentLoaded', () => {
            loadDailySummary();
            loadMemos();
            setupEventListeners();
        });

        // ==================== 事件监听 ====================
        function setupEventListeners() {
            document.getElementById('createMemoBtn').addEventListener('click', () => openMemoModal());
            document.getElementById('saveMemoBtn').addEventListener('click', saveMemo);

            document.querySelectorAll('.btn-group .btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.status;
                    currentPage = 1;
                    loadMemos();
                });
            });

            document.getElementById('searchBtn').addEventListener('click', () => {
                currentPage = 1;
                loadMemos();
            });
            // 回车搜索
            document.getElementById('searchTitle').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { currentPage = 1; loadMemos(); }
            });

            document.getElementById('refreshBtn').addEventListener('click', loadDailySummary);

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                localStorage.removeItem('username');
                window.location.href = '/login';
            });
        }

        // ==================== 每日汇总 ====================
        async function loadDailySummary() {
            try {
                const response = await fetch('/api/memo/daily-summary', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                if (data.code === 200) {
                    const s = data.data;
                    document.getElementById('statTodayTotal').textContent = s.todayTotal || 0;
                    document.getElementById('statCompleted').textContent = s.completed || 0;
                    document.getElementById('statUncompleted').textContent = s.uncompleted || 0;
                    document.getElementById('statHighPriority').textContent = s.highPriority || 0;
                    document.getElementById('statOverdue').textContent = s.overdue || 0;
                }
            } catch (error) {
                console.error('加载汇总失败:', error);
            }
        }

        // ==================== 加载备忘录 ====================
        async function loadMemos() {
            const memoList = document.getElementById('memoList');
            memoList.innerHTML = '<div class="loading-container"><div class="spinner-custom"></div><p>加载中...</p></div>';

            const params = new URLSearchParams();
            params.append('pageNum', currentPage);
            params.append('pageSize', pageSize);

            const title = document.getElementById('searchTitle').value;
            if (title) params.append('title', title);

            const priority = document.getElementById('searchPriority').value;
            if (priority) params.append('priority', priority);

            if (currentFilter === 'completed') params.append('completed', 'true');
            else if (currentFilter === 'uncompleted') params.append('completed', 'false');

            try {
                const response = await fetch('/api/memo/page?' + params.toString(), {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                if (data.code === 200) {
                    currentMemos = data.data.records || [];
                    totalPages = data.data.pages || 1;
                    renderMemos();
                    renderPagination();
                } else {
                    memoList.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><p>加载失败</p></div>';
                }
            } catch (error) {
                console.error('加载失败:', error);
                memoList.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><p>网络错误，请稍后重试</p></div>';
            }
        }

        // ==================== 渲染备忘录 ====================
        function renderMemos() {
            const memoList = document.getElementById('memoList');
            if (currentMemos.length === 0) {
                memoList.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>暂无备忘录，点击上方"创建备忘录"开始记录</p></div>';
                return;
            }
            memoList.innerHTML = currentMemos.map(memo => {
                const priorityMap = {
                    1: { cls: 'high', label: '高优先级', badgeCls: 'priority-high' },
                    2: { cls: 'medium', label: '中优先级', badgeCls: 'priority-medium' },
                    3: { cls: 'low', label: '低优先级', badgeCls: 'priority-low' }
                };
                const p = priorityMap[memo.priority] || priorityMap[2];

                let dueDateHtml = '';
                if (memo.dueDate) {
                    const dueDate = new Date(memo.dueDate);
                    const now = new Date();
                    const isOverdue = dueDate < now && !memo.isCompleted;
                    const dateStr = dueDate.toLocaleDateString('zh-CN');
                    dueDateHtml = `<span class="due-date ${isOverdue ? 'overdue' : ''}">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        ${dateStr}${isOverdue ? '<span class="overdue-label">已逾期</span>' : ''}
                    </span>`;
                }

                return `
                    <div class="memo-item ${memo.isCompleted ? 'completed' : ''} ${p.cls}">
                        <div class="memo-header">
                            <div class="memo-header-left">
                                <input type="checkbox" class="complete-checkbox" ${memo.isCompleted ? 'checked' : ''} data-id="${memo.id}">
                                <div>
                                    <span class="memo-title">${escapeHtml(memo.title)}</span>
                                    <span class="priority-badge ${p.badgeCls}">${p.label}</span>
                                </div>
                            </div>
                        </div>
                        ${memo.content ? `<div class="memo-content">${escapeHtml(memo.content)}</div>` : ''}
                        <div class="memo-footer">
                            <div class="memo-footer-info">
                                ${dueDateHtml}
                                <span>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px;">
                                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                                    </svg>
                                    ${formatDate(memo.createTime)}
                                </span>
                            </div>
                            <div class="memo-actions">
                                <button class="btn btn-outline-primary edit-btn" data-id="${memo.id}">编辑</button>
                                <button class="btn btn-outline-danger delete-btn" data-id="${memo.id}">删除</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 事件绑定
            document.querySelectorAll('.complete-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    updateMemoStatus(id, e.target.checked);
                });
            });
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => editMemo(e.target.dataset.id));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => deleteMemo(e.target.dataset.id));
            });
        }

        // ==================== 分页 ====================
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }

            let html = '';
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${currentPage - 1}">上一页</a></li>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" data-page="${i}">${i}</a></li>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }

            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" data-page="${currentPage + 1}">下一页</a></li>`;

            pagination.innerHTML = html;
            pagination.querySelectorAll('.page-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = parseInt(e.target.dataset.page);
                    if (page >= 1 && page <= totalPages) {
                        currentPage = page;
                        loadMemos();
                    }
                });
            });
        }

        // ==================== 打开模态框 ====================
        function openMemoModal(memo = null) {
            const form = document.getElementById('memoForm');
            if (memo) {
                document.getElementById('memoModalLabel').textContent = '编辑备忘录';
                document.getElementById('saveMemoBtn').textContent = '更新';
                document.getElementById('memoId').value = memo.id;
                document.getElementById('memoTitle').value = memo.title;
                document.getElementById('memoContent').value = memo.content || '';
                const pMap = { 1: 'HIGH', 2: 'MEDIUM', 3: 'LOW' };
                document.getElementById('memoPriority').value = pMap[memo.priority] || 'MEDIUM';
                document.getElementById('memoDueDate').value = memo.dueDate ? formatDateInput(memo.dueDate) : '';
            } else {
                document.getElementById('memoModalLabel').textContent = '创建备忘录';
                document.getElementById('saveMemoBtn').textContent = '保存';
                form.reset();
                document.getElementById('memoId').value = '';
                document.getElementById('memoPriority').value = 'MEDIUM';
            }
            memoModal.show();
        }

        // ==================== 保存备忘录 ====================
        async function saveMemo() {
            const id = document.getElementById('memoId').value;
            const title = document.getElementById('memoTitle').value.trim();
            const content = document.getElementById('memoContent').value.trim();
            const priority = document.getElementById('memoPriority').value;
            const dueDate = document.getElementById('memoDueDate').value;

            if (!title) { showToast('标题不能为空', 'warning'); return; }

            const memoData = { title, content, priority, dueDate: dueDate || null };

            try {
                const url = id ? '/api/memo/' + id : '/api/memo';
                const method = id ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
                    body: JSON.stringify(memoData)
                });
                const data = await response.json();
                if (data.code === 200) {
                    memoModal.hide();
                    showToast(id ? '更新成功' : '创建成功', 'success');
                    loadMemos();
                    loadDailySummary();
                } else {
                    showToast(data.msg || '操作失败', 'error');
                }
            } catch (error) {
                console.error('保存失败:', error);
                showToast('保存失败，请稍后重试', 'error');
            }
        }

        // ==================== 更新状态 ====================
        async function updateMemoStatus(id, completed) {
            try {
                const response = await fetch('/api/memo/' + id + '/status?completed=' + completed, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                if (data.code === 200) {
                    loadMemos();
                    loadDailySummary();
                } else {
                    showToast(data.msg || '操作失败', 'error');
                    loadMemos();
                }
            } catch (error) {
                console.error('更新状态失败:', error);
                showToast('操作失败，请稍后重试', 'error');
                loadMemos();
            }
        }

        // ==================== 编辑 ====================
        function editMemo(id) {
            const memo = currentMemos.find(m => m.id === parseInt(id));
            if (memo) openMemoModal(memo);
        }

        // ==================== 删除 ====================
        function deleteMemo(id) {
            // 用自定义确认框替代 confirm
            showDeleteConfirm(() => doDelete(id));
        }

        function showDeleteConfirm(onConfirm) {
            const container = document.querySelector('.toast-container') || document.body;
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;';
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:12px;padding:28px 32px;min-width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;animation:fadeInUp 0.25s ease;">
                    <div style="font-size:40px;margin-bottom:12px;">🗑</div>
                    <h5 style="margin-bottom:8px;font-weight:600;">确认删除</h5>
                    <p style="color:#718096;font-size:14px;margin-bottom:20px;">确定要删除这个备忘录吗？<br>此操作不可撤销。</p>
                    <div style="display:flex;gap:12px;justify-content:center;">
                        <button class="btn btn-outline-secondary" id="cancelDeleteBtn">取消</button>
                        <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#cancelDeleteBtn').addEventListener('click', () => overlay.remove());
            overlay.querySelector('#confirmDeleteBtn').addEventListener('click', () => { overlay.remove(); onConfirm(); });
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        }

        async function doDelete(id) {
            try {
                const response = await fetch('/api/memo/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await response.json();
                if (data.code === 200) {
                    showToast('删除成功', 'success');
                    loadMemos();
                    loadDailySummary();
                } else {
                    showToast(data.msg || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败，请稍后重试', 'error');
            }
        }

        // ==================== 工具函数（补充） ====================
        function formatDateInput(date) {
            if (!date) return '';
            const d = new Date(date);
            return d.toISOString().split('T')[0];
        }
    </script>
</body>
</html>
